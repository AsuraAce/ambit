name: "release"

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-tauri:
    permissions:
      contents: write
    environment: updater-signing
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: validate release tag provenance
        run: node ./scripts/check-release-tag.mjs

      - name: install rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable action
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || '' }}

      - name: cache rust dependencies
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: run production dependency audit
        run: pnpm run audit:prod

      - name: install cargo-audit
        run: cargo install cargo-audit --version 0.22.1 --locked

      # RUSTSEC-2023-0071 is ignored by the audit wrapper because it is pulled
      # through optional sqlx-mysql while Ambit only enables the SQLite beta path.
      - name: run rust dependency advisory audit
        run: pnpm run audit:rust

      - name: verify release gate
        run: pnpm run verify:release

      - name: verify updater signing configuration
        shell: bash
        env:
          HAS_SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ "${HAS_SIGNING_KEY}" != "true" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is required to sign updater artifacts."
            exit 1
          fi

          decoded_key="$(printf '%s' "${TAURI_SIGNING_PRIVATE_KEY}" | base64 --decode 2>/dev/null || true)"
          if [ -z "${decoded_key}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY must be the CI key string generated by 'tauri signer generate --ci'."
            exit 1
          fi

          mkdir -p .tmp
          printf 'ambit updater signing smoke test' > .tmp/updater-signing-smoke-test.txt
          if ! pnpm tauri signer sign --password="${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" .tmp/updater-signing-smoke-test.txt >/dev/null; then
            echo "::error::Updater signing smoke test failed. Check TAURI_SIGNING_PRIVATE_KEY and TAURI_SIGNING_PRIVATE_KEY_PASSWORD."
            exit 1
          fi
          rm -f .tmp/updater-signing-smoke-test.txt .tmp/updater-signing-smoke-test.txt.sig

      - name: extract updater release notes
        id: release-notes
        shell: pwsh
        run: |
          $notes = node ./scripts/extract-release-notes.mjs $env:GITHUB_REF_NAME
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $delimiter = "ambit_release_notes_$([Guid]::NewGuid().ToString('N'))"
          "body<<$delimiter" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $notes | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $delimiter | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # action-v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Ambit ${{ github.ref_name }}"
          releaseBody: ${{ steps.release-notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: --bundles nsis msi
