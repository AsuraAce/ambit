name: dependency-security

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read

concurrency:
  group: dependency-security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  dependency-audits:
    name: dependency-audits
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: determine dependency audit scope
        id: audit-scope
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            node ./scripts/dependency-audit-scope.mjs --all >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only -z \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" |
            node ./scripts/dependency-audit-scope.mjs >> "$GITHUB_OUTPUT"

      - name: install pnpm
        if: steps.audit-scope.outputs.run_npm == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: run production dependency audit
        if: steps.audit-scope.outputs.run_npm == 'true'
        run: pnpm audit --prod

      - name: install rust
        if: steps.audit-scope.outputs.run_rust == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable action
        with:
          toolchain: 1.96.0

      - name: cache rust dependencies
        if: steps.audit-scope.outputs.run_rust == 'true'
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: install cargo-audit
        if: steps.audit-scope.outputs.run_rust == 'true'
        run: cargo install cargo-audit --version 0.22.1 --locked

      # RUSTSEC-2023-0071 is ignored by the audit wrapper because it is pulled
      # through optional sqlx-mysql while Ambit only enables the SQLite beta path.
      - name: run rust dependency advisory audit
        if: steps.audit-scope.outputs.run_rust == 'true'
        run: node ./scripts/audit-rust.mjs

      - name: report skipped audits
        if: steps.audit-scope.outputs.run_npm != 'true' && steps.audit-scope.outputs.run_rust != 'true'
        run: echo "No dependency manifest, audit wrapper, Dependabot config, or workflow changed; audits skipped."
