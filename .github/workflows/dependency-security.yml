name: dependency-security

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read

concurrency:
  group: dependency-security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  dependency-review:
    name: dependency-review
    if: github.event_name == 'pull_request' && (!github.event.repository.private || vars.ENABLE_PRIVATE_DEPENDENCY_REVIEW == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6.0.2

      - name: review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  dependency-audits:
    name: dependency-audits
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: check whether full audits are needed
        id: audit-scope
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run_audits=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")"
          echo "$changed_files"

          if echo "$changed_files" | grep -Eq '^(package\.json|pnpm-lock\.yaml|src-tauri/Cargo\.(toml|lock)|scripts/audit-rust\.mjs|\.github/workflows/dependency-security\.yml)$'; then
            echo "run_audits=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_audits=false" >> "$GITHUB_OUTPUT"
          fi

      - name: install pnpm
        if: steps.audit-scope.outputs.run_audits == 'true'
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 9

      - name: setup node
        if: steps.audit-scope.outputs.run_audits == 'true'
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: install frontend dependencies
        if: steps.audit-scope.outputs.run_audits == 'true'
        run: pnpm install --frozen-lockfile

      - name: run production dependency audit
        if: steps.audit-scope.outputs.run_audits == 'true'
        run: pnpm run audit:prod

      - name: install rust stable
        if: steps.audit-scope.outputs.run_audits == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: cache rust dependencies
        if: steps.audit-scope.outputs.run_audits == 'true'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: install cargo-audit
        if: steps.audit-scope.outputs.run_audits == 'true'
        run: cargo install cargo-audit --version 0.22.1 --locked

      # RUSTSEC-2023-0071 is ignored by the audit wrapper because it is pulled
      # through optional sqlx-mysql while Ambit only enables the SQLite beta path.
      - name: run rust dependency advisory audit
        if: steps.audit-scope.outputs.run_audits == 'true'
        run: pnpm run audit:rust

      - name: skip full audits
        if: steps.audit-scope.outputs.run_audits != 'true'
        run: echo "No dependency manifest or audit wrapper changed; full audits skipped for this PR."
