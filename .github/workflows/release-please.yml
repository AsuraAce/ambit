name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-please-main
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: verify release automation prerequisites
        env:
          HAS_CLIENT_ID: ${{ vars.RELEASE_APP_CLIENT_ID != '' }}
          HAS_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY != '' }}
        run: |
          if [ "${HAS_CLIENT_ID}" != "true" ] || [ "${HAS_PRIVATE_KEY}" != "true" ]; then
            echo "::error::RELEASE_APP_CLIENT_ID and RELEASE_APP_PRIVATE_KEY are required."
            exit 1
          fi

      - name: create release app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: create release PR or GitHub Release
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}
