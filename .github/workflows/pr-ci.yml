name: pr-ci

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend-checks:
    name: frontend-checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6.0.2

      - name: install pnpm
        uses: pnpm/action-setup@v6.0.8

      - name: setup node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: verify version consistency
        run: pnpm check:versions

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: lint
        run: pnpm run lint

      - name: typecheck
        run: pnpm run typecheck

      - name: run coverage tests
        run: pnpm run coverage

      - name: guard production build output
        run: pnpm run build:guard

  rust-tests:
    name: rust-tests
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6.0.2

      - name: install pnpm
        uses: pnpm/action-setup@v6.0.8

      - name: setup node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: verify version consistency
        run: pnpm check:versions

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: verify generated bindings
        run: pnpm run bindings:check

      - name: run rust tests
        run: pnpm test:rust

      - name: verify Tauri no-bundle build
        run: pnpm run tauri:check
