name: pr-ci

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend-checks:
    name: frontend-checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: verify version consistency
        run: pnpm check:versions

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: run production dependency audit
        run: pnpm run audit:prod

      - name: typecheck
        run: pnpm exec tsc --noEmit

      - name: run frontend tests
        run: pnpm exec vitest run

      - name: build frontend
        run: pnpm build

  rust-tests:
    name: rust-tests
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: verify version consistency
        run: pnpm check:versions

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install cargo-audit
        run: cargo install cargo-audit --version 0.22.1 --locked

      # RUSTSEC-2023-0071 is ignored by the audit wrapper because it is pulled
      # through optional sqlx-mysql while Ambit only enables the SQLite beta path.
      - name: run rust dependency advisory audit
        run: pnpm run audit:rust

      - name: run rust tests
        run: pnpm test:rust
