name: pr-ci

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend-checks:
    name: frontend-checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: install pnpm
        uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: validate pull request title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node ./scripts/check-pr-title.mjs "$PR_TITLE"

      - name: verify version consistency
        run: pnpm check:versions

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: lint
        run: pnpm run lint

      - name: typecheck
        run: pnpm run typecheck

      - name: run coverage tests
        run: pnpm run coverage

      - name: guard production build output
        run: pnpm run build:guard

  rust-tests:
    name: rust-tests
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      RUSTUP_TOOLCHAIN: 1.88.0
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: install pnpm
        uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: verify version consistency
        run: pnpm check:versions

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: install minimum supported rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable action
        with:
          toolchain: 1.88.0

      - name: verify minimum supported rust
        shell: pwsh
        run: |
          $version = rustc --version
          if ($version -notmatch '^rustc 1\.88\.0 ') {
            throw "Expected Rust 1.88.0, got: $version"
          }
          $version

      - name: cache rust dependencies
        uses: swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri

      - name: verify generated bindings
        run: pnpm run bindings:check

      - name: run rust tests
        run: pnpm test:rust

      - name: verify Tauri no-bundle build
        run: pnpm run tauri:check
