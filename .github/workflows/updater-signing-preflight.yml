name: updater-signing-preflight

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: updater-signing-preflight
  cancel-in-progress: false

jobs:
  verify-updater-signing:
    name: Verify updater signing secret
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: verify updater signing secret
        shell: bash
        env:
          HAS_SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ "${HAS_SIGNING_KEY}" != "true" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is required to sign updater artifacts."
            exit 1
          fi

          decoded_key="$(printf '%s' "${TAURI_SIGNING_PRIVATE_KEY}" | base64 --decode 2>/dev/null || true)"
          if [ -z "${decoded_key}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY must be the CI key string generated by 'tauri signer generate --ci'."
            exit 1
          fi

          mkdir -p .tmp
          trap 'rm -f .tmp/updater-signing-preflight.txt .tmp/updater-signing-preflight.txt.sig' EXIT

          printf 'ambit updater signing preflight' > .tmp/updater-signing-preflight.txt
          if ! pnpm tauri signer sign --password="${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" .tmp/updater-signing-preflight.txt >/dev/null; then
            echo "::error::Updater signing preflight failed. Check TAURI_SIGNING_PRIVATE_KEY and TAURI_SIGNING_PRIVATE_KEY_PASSWORD."
            exit 1
          fi

          echo "Updater signing preflight passed."
