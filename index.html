<!DOCTYPE html>
<html lang="en" class="dark" style="background-color: #09090b;">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ambit | Local AI Workspace</title>
  <link rel="icon" type="image/svg+xml" href="/branding/ambit-mark.svg" />
  <link rel="preload" href="/branding/ambit-glyph.svg" as="image" type="image/svg+xml" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
    rel="stylesheet">
  <style>
    /* Critical: Set background immediately to prevent white flash */
    html,
    body {
      background-color: #09090b !important;
      margin: 0;
      padding: 0;
      overflow: hidden !important;
    }

    /* Static loading screen - visible before React mounts */
    .static-loading {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px),
        radial-gradient(circle at 50% 38%, rgba(92, 108, 70, 0.18), transparent 30%),
        linear-gradient(180deg, #10130f 0%, #09090b 100%);
      background-size: 48px 48px, 48px 48px, 100% 100%, 100% 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.9rem;
      font-family: 'Inter', system-ui, sans-serif;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.4s ease-out;
    }

    .static-loading__brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.05rem;
      opacity: 0;
      transform: translateY(10px) scale(0.985);
      animation: brand-in 420ms cubic-bezier(0.22, 1, 0.36, 1) 60ms forwards;
    }

    .static-loading__mark-container {
      position: relative;
      width: 6.75rem;
      height: 6.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .static-loading__glow {
      position: absolute;
      inset: 0.55rem;
      background: radial-gradient(circle, rgba(214, 193, 116, 0.16) 0%, rgba(122, 143, 90, 0.13) 45%, transparent 72%);
      filter: blur(24px);
      border-radius: 9999px;
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    .static-loading__mark {
      width: 5.25rem;
      height: 5.25rem;
      position: relative;
      z-index: 10;
      filter: drop-shadow(0 16px 32px rgba(0, 0, 0, 0.38));
    }

    .static-loading__loader-ring {
      position: absolute;
      inset: 0;
      z-index: 20;
      color: #e3c978;
      filter: drop-shadow(0 0 10px rgba(227, 201, 120, 0.22));
      animation: loader-ring-spin 2.4s linear infinite;
    }

    .static-loading__loader-track,
    .static-loading__loader-arc {
      fill: none;
      transform-origin: 50% 50%;
    }

    .static-loading__loader-track {
      stroke: rgba(255, 255, 255, 0.07);
      stroke-width: 1.5;
    }

    .static-loading__loader-arc {
      stroke: currentColor;
      stroke-width: 2.6;
      stroke-linecap: round;
      stroke-dasharray: 88 214;
    }

    .static-loading__text {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .static-loading__title {
      font-size: 1.65rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.95);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin: 0;
    }

    .static-loading__subtitle {
      font-size: 0.875rem;
      color: rgba(204, 211, 199, 0.68);
      font-weight: 500;
      margin: 0;
    }

    .static-loading__status {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      min-width: 11rem;
      opacity: 0;
      transform: translateY(6px);
      animation: brand-in 420ms cubic-bezier(0.22, 1, 0.36, 1) 150ms forwards;
    }

    @keyframes loader-ring-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    @keyframes brand-in {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.985);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .static-loading__brand,
      .static-loading__status,
      .static-loading__glow,
      .static-loading__loader-ring {
        animation: none;
      }

      .static-loading__brand,
      .static-loading__status {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>

<body style="background-color: #09090b; margin: 0; overflow: hidden;">
  <div id="root"></div>
  <!-- Static loading screen - persists until removed by App.tsx -->
  <div id="static-loading" class="static-loading">
    <div class="static-loading__brand">
      <div class="static-loading__mark-container">
        <div class="static-loading__glow"></div>
        <img class="static-loading__mark" src="/branding/ambit-glyph.svg" alt="Ambit logo" fetchpriority="high" decoding="sync" />
        <svg class="static-loading__loader-ring" viewBox="0 0 108 108" aria-hidden="true">
          <circle class="static-loading__loader-track" cx="54" cy="54" r="49" />
          <circle class="static-loading__loader-arc" cx="54" cy="54" r="49" />
        </svg>
      </div>
      <div class="static-loading__text">
        <h1 class="static-loading__title">AMBIT</h1>
      </div>
    </div>
    <div class="static-loading__status" aria-live="polite">
      <p class="static-loading__subtitle">Initializing library...</p>
    </div>
  </div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
